name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  lint-typecheck-test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy src/

      - name: Pytest
        run: pytest

  codegen-freshness:
    name: Codegen freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      # Re-runs codegen against the SHA pinned in SPECS_REF and asserts
      # that the working tree matches what's committed. Catches:
      #   - SPECS_REF bumped without re-running codegen
      #   - hand-edits to _generated/ that drift from the spec
      - name: Regenerate models from pinned specs
        run: python scripts/codegen.py

      - name: Assert no diff
        shell: bash
        run: |
          if ! git diff --exit-code src/eugene_plexus_watchdog/_generated/; then
            echo "::error::Generated models are out of sync with SPECS_REF."
            echo "Run 'python scripts/codegen.py' locally and commit the result."
            exit 1
          fi

  dco:
    name: DCO sign-off check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check Signed-off-by lines on every PR commit
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r sha; do
            [[ -z "$sha" ]] && continue
            name=$(git log -1 --format=%an "$sha")
            email=$(git log -1 --format=%ae "$sha")
            expected="Signed-off-by: ${name} <${email}>"
            msg=$(git log -1 --format=%B "$sha")
            if ! grep -Fxq "$expected" <<<"$msg"; then
              echo "::error::Commit $sha by ${name} <${email}> is missing a matching DCO sign-off."
              echo "  Expected line: ${expected}"
              echo "  Fix with: git commit --amend -s --no-edit  (or: git rebase --signoff main)"
              status=1
            fi
          done < <(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")
          exit $status
